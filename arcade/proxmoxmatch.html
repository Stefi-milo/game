<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕹️</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxmox Match</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#e0e0e0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;height:100vh;overflow:hidden;}
h1{color:#ff4dff;letter-spacing:4px;margin:15px 0;font-size:1.8rem;flex-shrink:0;}
#menu{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;flex:1;overflow-y:auto;padding-bottom:10px;}
.selector-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;flex-shrink:0;}
.selector-card{padding:8px 12px;border:1px solid #333;border-radius:8px;cursor:pointer;font-size:12px;}
.active{border-color:#00ffd0;background:#1a2330;box-shadow:0 0 8px #00ffd0;}
#debug{font-size:11px;color:#555;margin:4px 0;flex-shrink:0;}
#topics{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;width:1100px;max-width:95vw;margin:0 auto;padding:10px;}
.topic-card{padding:28px 16px;background:#161b27;border:2px solid #2a2f3e;border-radius:12px;cursor:pointer;text-align:center;font-size:14px;font-weight:bold;word-break:break-word;overflow-wrap:break-word;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:0.2s;color:#e0e0e0;line-height:1.5;letter-spacing:0.5px;}
.topic-card:hover{border-color:#ff6b35;color:#ff6b35;transform:translateY(-3px);}
@media(max-width:600px){#topics{grid-template-columns:repeat(2,1fr);width:95vw;}}
#game{display:none;flex-direction:column;align-items:center;width:100%;flex:1;overflow-y:auto;}
.stats{margin-top:10px;font-size:14px;text-align:center;flex-shrink:0;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:95%;margin-top:10px;}
@media(min-width:600px){.grid{grid-template-columns:repeat(4,1fr);}}
.card{border-radius:10px;display:flex;align-items:center;justify-content:center;padding:10px 8px;text-align:center;font-size:12px;box-sizing:border-box;cursor:pointer;min-height:80px;border:2px solid transparent;transition:transform 0.15s,box-shadow 0.2s,background 0.3s,border-color 0.3s,color 0.3s;user-select:none;line-height:1.4;word-break:break-word;}
.card:hover:not(.matched){transform:scale(1.04);}
.card.cmd{background:#2d0e0e;border-color:#c0392b;color:#ff9090;}
.card.desc{background:#2d1800;border-color:#e07b20;color:#ffb366;}
.card.selected{box-shadow:0 0 0 2px #fff,0 0 14px rgba(255,255,255,0.25);transform:scale(1.06);}
.card.wrong{animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.card.matched{background:#0a2e1a;border-color:#00ffae;color:#00ffae;box-shadow:0 0 12px #00ffae44;cursor:default;transform:none !important;}
#back-btn{margin:10px;padding:8px 16px;background:transparent;border:1px solid #f05033;color:#f05033;border-radius:8px;cursor:pointer;font-family:'Courier New',monospace;font-size:13px;flex-shrink:0;}
#back-btn:hover{background:#f0503322;}
</style>
</head>

<body>

<h1>Proxmox</h1>

<div id="menu">
  <div class="selector-row" id="difficulty"></div>
  <div class="selector-row" id="mode"></div>
  <div class="selector-row" id="timer"></div>
  <div id="debug"></div>
  <div id="topics"></div>
</div>

<div id="game">
  <button id="back-btn" onclick="backToMenu()">← Menu</button>
  <div class="stats" id="stats"></div>
  <div class="grid" id="cards"></div>
</div>

<script>
let TOPICS={}
let selectedDiff=8
let selectedMode='normal'
let timerMode=false
let timerInterval=null

async function loadData(){
  try{
    const res=await fetch('cheatsheet-proxmox')
    if(!res.ok) throw new Error('HTTP '+res.status)
    const text=await res.text()
    TOPICS=parse(text)
    const count=Object.keys(TOPICS).length
    const pairs=Object.values(TOPICS).reduce((s,v)=>s+v.length,0)
    document.getElementById('debug').innerText=`Loaded ${count} topics, ${pairs} total pairs`
    buildUI()
  }catch(e){
    document.getElementById('debug').innerText='Error loading file: '+e.message
  }
}

function parse(raw){
  const topics={}
  let current=null
  let pendingDesc=null
  for(let raw_line of raw.split('\n')){
    const line=raw_line.trim()
    if(!line) continue
    if(/^\*\*\s*.+\s*\*\*$/.test(line)){
      pendingDesc=null
      current=line.replace(/\*\*/g,'').trim()
      if(!topics[current]) topics[current]=[]
      continue
    }
    if(line.startsWith('#')){
      pendingDesc=line.replace(/^#+\s*/,'').trim()
      continue
    }
    if(pendingDesc && current){
      topics[current].push([line,pendingDesc])
      pendingDesc=null
    }else pendingDesc=null
  }
  for(const k of Object.keys(topics)){
    if(topics[k].length<2) delete topics[k]
  }
  return topics
}

function buildUI(){
  const d=document.getElementById('difficulty')
  d.innerHTML=''
  ;[4,8,12].forEach(v=>{
    let el=document.createElement('div')
    el.className='selector-card'+(v===8?' active':'')
    el.innerText=v+' pairs'
    el.onclick=()=>{
      selectedDiff=v
      document.querySelectorAll('#difficulty .selector-card').forEach(x=>x.classList.remove('active'))
      el.classList.add('active')
    }
    d.appendChild(el)
  })
  const m=document.getElementById('mode')
  m.innerHTML=''
  ;['normal','reverse'].forEach(v=>{
    let el=document.createElement('div')
    el.className='selector-card'+(v==='normal'?' active':'')
    el.innerText=v
    el.onclick=()=>{
      selectedMode=v
      document.querySelectorAll('#mode .selector-card').forEach(x=>x.classList.remove('active'))
      el.classList.add('active')
    }
    m.appendChild(el)
  })
  const t=document.getElementById('timer')
  t.innerHTML=''
  let el=document.createElement('div')
  el.className='selector-card'
  el.innerText='TIMER MODE'
  el.onclick=()=>{
    timerMode=!timerMode
    el.classList.toggle('active',timerMode)
  }
  t.appendChild(el)
  const tp=document.getElementById('topics')
  tp.innerHTML=''
  const names=Object.keys(TOPICS).sort()
  if(names.length===0){
    tp.innerHTML='<p style="color:#ff6b6b">No topics found — check cheatsheet-proxmox format</p>'
    return
  }
  names.forEach(name=>{
    let el=document.createElement('div')
    el.className='topic-card'; el.setAttribute('data-topic',name)
    el.innerText=name+' ('+TOPICS[name].length+')'
    el.onclick=()=>startGame(name)
    tp.appendChild(el)
  })
  applyHighlights()
  
}

function backToMenu(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  document.getElementById('game').style.display='none'
  document.getElementById('menu').style.display='flex'
  if(lastTopic){saveResult(lastTopic,lastMistakes);applyHighlights();}
  parent.postMessage({type:'backToMenu'},'*');
  parent.postMessage({type:'backToMenu'},'*');
}
var lastTopic=null; var lastMistakes=0;
var GAME_KEY='arcade_results_proxmoxmatch';
function loadResults(){try{return JSON.parse(localStorage.getItem(GAME_KEY)||'{}')}catch{return {}}}
function saveResult(topic,mistakes){var r=loadResults();r[topic]={mistakes:mistakes,ts:Date.now()};localStorage.setItem(GAME_KEY,JSON.stringify(r))}
function applyHighlights(){var r=loadResults();document.querySelectorAll('.topic-card').forEach(function(el){var t=el.getAttribute('data-topic');if(!t)return;
  // Remove old badge if any
  var old=el.querySelector('.badge');if(old)old.remove();
  if(!r[t])return;
  var badge=document.createElement('div');
  badge.className='badge';
  if(r[t].mistakes===0){
    el.style.border='2px solid #ffdd00';
    el.style.boxShadow='0 0 10px #ffdd0099';
    badge.style.cssText='margin-top:6px;font-size:10px;color:#ffdd00;letter-spacing:1px;font-weight:bold;';
    badge.innerText='✅ MASTERED';
  }else{
    el.style.border='2px solid #ff4d4d';
    el.style.boxShadow='0 0 10px #ff4d4d99';
    badge.style.cssText='margin-top:6px;font-size:10px;color:#ff4d4d;letter-spacing:1px;font-weight:bold;';
    badge.innerText='❌ FAILED ('+r[t].mistakes+' mistakes)';
  }
  el.appendChild(badge);
})}
function startGame(topic){
  lastTopic=topic; lastMistakes=0;
  document.getElementById('menu').style.display='none'
  document.getElementById('game').style.display='flex'
  parent.postMessage({type:'gameStarted'},'*');
  parent.postMessage({type:'gameStarted'},'*');
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}

  const pool=[...TOPICS[topic]]
  const count=Math.min(selectedDiff,pool.length)
  let pairs=pool.sort(()=>Math.random()-0.5).slice(0,count)

  let cards=[]
  pairs.forEach((p,i)=>{
    let id='p'+i
    let cmd=selectedMode==='normal'?p[0]:p[1]
    let desc=selectedMode==='normal'?p[1]:p[0]
    cards.push({id,text:cmd,type:'cmd'})
    cards.push({id,text:desc,type:'desc'})
  })
  cards.sort(()=>Math.random()-0.5)

  let sel=null, mistakes=0, score=0, streak=0
  let matched=0
  let start=Date.now()
  let timeLimit=timerMode?60:9999999

  function updateStats(){
    let elapsed=Math.floor((Date.now()-start)/1000)
    let t=Math.max(0,timeLimit-elapsed)
    document.getElementById('stats').innerText=`⏱ ${timerMode?t+'s':elapsed+'s'} | ❌ Mistakes: ${mistakes} | Score: ${score} | Streak: ${streak}`
    if(timerMode && t<=0){
      clearInterval(timerInterval)
      timerInterval=null
      setTimeout(()=>alert('Time up! Score: '+score+' | Mistakes: '+mistakes),100)
    }
  }

  timerInterval=setInterval(updateStats,500)
  updateStats()

  const grid=document.getElementById('cards')
  grid.innerHTML=''

  let locked=false

  cards.forEach(c=>{
    let card=document.createElement('div')
    card.className='card '+c.type
    card.innerText=c.text

    card.onclick=()=>{
      if(locked) return
      if(card.classList.contains('matched')) return
      if(sel && sel.card===card){
        card.classList.remove('selected')
        sel=null
        return
      }

      card.classList.add('selected')

      if(!sel){
        sel={card,c}
      }else{
        if(sel.c.id===c.id){
          card.classList.remove('selected')
          sel.card.classList.remove('selected')
          card.classList.add('matched')
          sel.card.classList.add('matched')
          streak++
          score+=10*streak
          matched++
          sel=null
          updateStats()
          if(matched===pairs.length){
            clearInterval(timerInterval)
            timerInterval=null
            const elapsed=Math.floor((Date.now()-start)/1000)
            parent.postMessage({type:"win"},"*"); setTimeout(()=>alert(`🎉 Completed in ${elapsed}s!\n❌ Mistakes: ${mistakes} | Score: ${score}`),200)
          }
        }else{
          streak=0
          score=Math.max(0,score-2)
          mistakes++; lastMistakes++; parent.postMessage({type:"mistake"},"*")
          locked=true
          card.classList.add('wrong')
          sel.card.classList.add('wrong')
          const prevSel=sel
          sel=null
          updateStats()
          setTimeout(()=>{
            card.classList.remove('selected','wrong')
            prevSel.card.classList.remove('selected','wrong')
            locked=false
          },400)
        }
      }
    }

    grid.appendChild(card)
  })
}

loadData()
</script>

</body>
</html>
